kind = "web"
previewPath = "/"
title = "Carbon Footprint Tracker"
version = "1.0.0"
id = "artifacts/carbon-footprint"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25515

[services.development]
run = "pnpm --filter @workspace/carbon-footprint run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/carbon-footprint", "run", "build" ]
publicDir = "artifacts/carbon-footprint/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25515"
BASE_PATH = "/"
